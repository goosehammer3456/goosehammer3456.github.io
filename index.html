    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f1f5f9;
      padding: 2rem 1rem;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .title {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #cbd5e1;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f1f5f9;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .links a:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .links a svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      fill: currentColor;
    }
  </style>
</head>
