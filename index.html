<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruce Johnson | Sales Engineer Manager at Delinea</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23003d1a'/><text x='50' y='68' text-anchor='middle' font-size='55' font-family='system-ui' font-weight='bold' fill='%2300ff5a'>BJ</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: linear-gradient(160deg, #003d1a 0%, #00261a 40%, #0a0f0d 100%);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #cbd5e1;
      --accent: 0, 255, 90;
      --card-bg: rgba(0, 255, 90, 0.06);
      --card-border: rgba(0, 255, 90, 0.15);
      --card-hover-bg: rgba(0, 255, 90, 0.12);
      --card-hover-border: rgba(0, 255, 90, 0.3);
      --avatar-border: rgba(0, 255, 90, 0.3);
      --toggle-bg: rgba(255, 255, 255, 0.1);
      --shadow-hover: 0 8px 24px rgba(0, 255, 90, 0.12);
    }

    [data-theme="light"] {
      --bg: linear-gradient(160deg, #e8f5ec 0%, #f0faf3 40%, #ffffff 100%);
      --text: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #334155;
      --card-bg: rgba(0, 80, 40, 0.06);
      --card-border: rgba(0, 80, 40, 0.15);
      --card-hover-bg: rgba(0, 80, 40, 0.1);
      --card-hover-border: rgba(0, 80, 40, 0.3);
      --avatar-border: rgba(0, 120, 50, 0.4);
      --toggle-bg: rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 8px 24px rgba(0, 60, 30, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1rem;
      transition: background 0.4s, color 0.4s;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: var(--toggle-bg);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, transform 0.2s;
      color: var(--text);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      object-fit: cover;
      border: 3px solid var(--avatar-border);
      transition: border-color 0.4s;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .title {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      transition: color 0.4s;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--text-tertiary);
      margin-bottom: 2rem;
      line-height: 1.5;
      transition: color 0.4s;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      border-radius: 12px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s, color 0.4s;
    }

    .links a:hover {
      background: var(--card-hover-bg);
      border-color: var(--card-hover-border);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .links a:active {
      transform: translateY(-1px);
    }

    .links a svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      fill: currentColor;
    }

    /* Animations */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up:nth-child(1) { animation-delay: 0.05s; }
    .fade-up:nth-child(2) { animation-delay: 0.12s; }
    .fade-up:nth-child(3) { animation-delay: 0.19s; }
    .fade-up:nth-child(4) { animation-delay: 0.26s; }

    .links .fade-up:nth-child(1) { animation-delay: 0.35s; }
    .links .fade-up:nth-child(2) { animation-delay: 0.42s; }
    .links .fade-up:nth-child(3) { animation-delay: 0.49s; }
  </style>
</head>
<body>
  <div class="card">
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" style="display:none"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zm0-5a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm0 18a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm9-9a1 1 0 110 2h-1a1 1 0 110-2h1zM4 12a1 1 0 110 2H3a1 1 0 110-2h1zm14.36-5.64a1 1 0 010 1.41l-.7.71a1 1 0 11-1.42-1.42l.71-.7a1 1 0 011.41 0zM7.76 16.24a1 1 0 010 1.41l-.71.71a1 1 0 11-1.41-1.42l.7-.7a1 1 0 011.42 0zm10.48 0a1 1 0 011.42 1.41l-.71.71a1 1 0 11-1.41-1.42l.7-.7zM7.76 7.76a1 1 0 01-1.42 0l-.7-.71a1 1 0 011.41-1.41l.71.7a1 1 0 010 1.42z"/></svg>
    </button>

    <img class="avatar fade-up" src="headshot.jpg" alt="Bruce Johnson">
    <h1 class="fade-up">Bruce Johnson</h1>
    <p class="title fade-up">Sales Engineer Manager at Delinea</p>
    <p class="tagline fade-up">Helping organizations secure privileged access</p>

    <div class="links">
      <a class="fade-up" href="https://outlook.office.com/bookwithme/user/88d4cdfa6c614bc0a9d45269d748e387@delinea.com/meetingtype/_-gBotxzXUCnvwcgtHUIXA2?anonymous&ismsaljsauthenabled&ep=mlink" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
        Book a 15 Min Call
      </a>
      <a class="fade-up" href="https://www.linkedin.com/in/bruce-johnson-se/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
      <a class="fade-up" href="https://delinea.com" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        Delinea
      </a>
    </div>
  </div>

  <script>
    const toggle = document.querySelector('.theme-toggle');
    const iconMoon = toggle.querySelector('.icon-moon');
    const iconSun = toggle.querySelector('.icon-sun');

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      iconMoon.style.display = theme === 'dark' ? 'block' : 'none';
      iconSun.style.display = theme === 'light' ? 'block' : 'none';
    }

    toggle.addEventListener('click', () => {
      const current = localStorage.getItem('theme') || 'dark';
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    setTheme(localStorage.getItem('theme') || 'dark');
  </script>
</body>
</html>
